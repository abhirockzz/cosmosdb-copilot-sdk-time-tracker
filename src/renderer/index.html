<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="marked.umd.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Login Overlay -->
  <div id="login-overlay" class="overlay">
    <div class="overlay-content">
      <div class="login-brand">
        <div class="login-icon">⏱</div>
        <h1>TimeTrack</h1>
        <p>Choose your profile to get started</p>
      </div>
      <div class="user-cards">
        <button class="user-card" data-user="alice">
          <div class="avatar" style="--avatar-color: #b45309">A</div>
          <span>Alice</span>
        </button>
        <button class="user-card" data-user="bob">
          <div class="avatar" style="--avatar-color: #0369a1">B</div>
          <span>Bob</span>
        </button>
        <button class="user-card" data-user="carol">
          <div class="avatar" style="--avatar-color: #4d7c0f">C</div>
          <span>Carol</span>
        </button>
      </div>
      <div id="custom-user-cards" class="user-cards custom-user-cards"></div>
      <div class="custom-login">
        <span class="custom-login-divider">or</span>
        <div class="custom-login-row">
          <input type="text" id="custom-user-input" class="custom-user-input" placeholder="Enter a name..." maxlength="20">
          <button id="custom-user-btn" class="custom-user-btn">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app hidden">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">TimeTrack</div>
      <nav class="header-nav">
        <button class="nav-tab active" data-view="timer">Timer</button>
        <button class="nav-tab" data-view="reports">Reports</button>
      </nav>
      <div class="header-user">
        <button id="user-menu-btn" class="user-menu-btn">
          <div class="avatar-sm" id="header-avatar">A</div>
          <span id="header-username">Alice</span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 5L6 8L9 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div id="user-dropdown" class="user-dropdown hidden">
          <div id="user-dropdown-list"></div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" id="logout-btn">Sign out</button>
        </div>
      </div>
    </header>

    <!-- Timer View -->
    <main id="timer-view" class="view">
      <!-- Timer Bar -->
      <div class="timer-bar">
        <input type="text" id="task-input" class="task-input" placeholder="What are you working on?">
        <div class="timer-fields">
          <input type="text" id="project-input" class="field-input" placeholder="Project">
          <input type="text" id="tag-input" class="field-input" placeholder="Tag">
        </div>
        <div class="timer-right">
          <div id="timer-display" class="timer-display">0:00:00</div>
          <button id="timer-btn" class="timer-btn">
            <svg id="play-icon" width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><polygon points="4,2 16,9 4,16"/></svg>
            <svg id="stop-icon" class="hidden" width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="1" width="12" height="12" rx="2"/></svg>
          </button>
        </div>
      </div>

      <!-- Entries List -->
      <div id="entries-container" class="entries-container">
        <div id="entries-list" class="entries-list">
          <!-- Populated by JS -->
        </div>
        <div id="entries-empty" class="entries-empty hidden">
          <div class="empty-icon">📋</div>
          <p>No time entries yet</p>
          <p class="text-muted">Start the timer or load sample data to get started</p>
          <button id="seed-btn" class="seed-btn">Load sample data</button>
        </div>
        <div id="entries-loading" class="entries-loading hidden">
          <div class="spinner"></div>
          <p>Loading entries...</p>
        </div>
      </div>
    </main>

    <!-- Reports View -->
    <main id="reports-view" class="view hidden">
      <!-- AI Query -->
      <div class="ai-section">
        <h3>Ask about your time</h3>
        <div class="ai-input-row">
          <input type="text" id="ai-input" class="ai-input" placeholder='e.g. "How much time did I spend on content this week?"'>
          <button id="ai-send-btn" class="ai-send-btn">Ask</button>
        </div>
        <div id="ai-response" class="ai-response hidden"></div>
        <div id="ai-loading" class="ai-loading hidden">
          <div class="spinner"></div>
          <span>Thinking...</span>
        </div>
      </div>

      <!-- Date Shortcuts -->
      <div class="report-controls">
        <div class="date-shortcuts">
          <button class="shortcut-btn" data-range="today">Today</button>
          <button class="shortcut-btn" data-range="yesterday">Yesterday</button>
          <button class="shortcut-btn active" data-range="this-week">This Week</button>
          <button class="shortcut-btn" data-range="last-week">Last Week</button>
        </div>
        <div id="date-label" class="date-label"></div>
      </div>

      <!-- Summary Cards -->
      <div class="summary-cards">
        <div class="summary-card">
          <div class="summary-label">Total Hours</div>
          <div class="summary-value" id="total-hours">0:00:00</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Avg Daily Hours</div>
          <div class="summary-value" id="avg-hours">0.00</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Entries</div>
          <div class="summary-value" id="entry-count">0</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-row">
        <div class="chart-card chart-bar">
          <h3>Duration by day</h3>
          <canvas id="duration-chart"></canvas>
        </div>
        <div class="chart-card chart-donut">
          <h3>Project distribution</h3>
          <canvas id="project-chart"></canvas>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
